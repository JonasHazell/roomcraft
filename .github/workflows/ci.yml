name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same branch/PR to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint, test & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      # `tsc -b` (part of build) type-checks the app and the server projects.
      - name: Build
        run: npm run build

  # The blocking gate. The shared CI runner cannot reliably run the WHOLE
  # Playwright suite (~200 specs × 2 viewports, most driving a full WebGL scene)
  # in parallel — under that load it wedges and a different random subset of
  # 3D-heavy specs times out every run, on main as well as on PRs. So the
  # required check runs only a small, fast, stable smoke set (the baseline flows
  # plus the patio planner) in both viewports — enough to catch a real
  # desktop/mobile regression without depending on the runner surviving the full
  # suite. The exhaustive suite still runs, non-blocking, in `e2e-full` below.
  # (Local `npm run test:e2e` runs the full suite and stamps validation — the
  # split is only about what GATES a merge, not what we run while developing.)
  e2e:
    name: E2E (desktop + mobile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # CI runners have no pre-installed Chromium, so fetch Playwright's browser
      # here. (The sandbox uses PLAYWRIGHT_BROWSERS_PATH instead — never run this
      # locally; playwright.config.ts resolves the pre-installed Chromium there.)
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # Smoke subset only (both `desktop` and `mobile` projects): the baseline
      # flows and the patio planner. Fast and stable on the shared runner.
      - name: E2E smoke (desktop + mobile)
        run: npx playwright test smoke patio

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-smoke
          path: playwright-report/
          retention-days: 7

  # The exhaustive suite — informational, NOT a merge gate. `continue-on-error`
  # lets it report its real red/green without failing the workflow run, so a
  # flaky-under-load run (see the note on `e2e` above) never blocks a PR. Read
  # its report/annotations for the full signal; when the runner is healthy this
  # is green, and if it starts failing for a real reason the report shows it.
  e2e-full:
    name: E2E full suite (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: E2E full suite (desktop + mobile)
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-full
          path: playwright-report/
          retention-days: 7
