name: Delete branch on PR close

# When a pull request is closed — whether it was merged or closed without
# merging — its head branch has done its job, so this workflow deletes it to
# keep the branch list tidy. GitHub's built-in "automatically delete head
# branches" setting only fires on merge; this also covers plain closes.
#
# The branch's commits are never lost: they stay reachable from the PR itself
# (the "Commits" and "Files changed" tabs are tied to the PR, not the branch),
# and a closed PR can still be reopened and the branch restored from its page.

on:
  pull_request:
    types: [closed]

# Needed to delete the head branch's ref.
permissions:
  contents: write

jobs:
  delete-branch:
    name: Delete the PR's head branch
    runs-on: ubuntu-latest
    # Only branches that live in this repo — a fork's branch isn't ours to
    # delete, and never touch the repo's default branch.
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref != github.event.repository.default_branch
    steps:
      - name: Delete the head branch
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          # The branch may already be gone (e.g. GitHub's own auto-delete, or a
          # manual delete). Treat a missing ref as success, not a failure.
          if ! gh api "repos/${GITHUB_REPOSITORY}/git/refs/heads/${HEAD_REF}" >/dev/null 2>&1; then
            echo "Branch '${HEAD_REF}' is already gone — nothing to delete."
            exit 0
          fi

          echo "Deleting branch '${HEAD_REF}' (PR #${PR_NUMBER})."
          gh api \
            --method DELETE \
            "repos/${GITHUB_REPOSITORY}/git/refs/heads/${HEAD_REF}"
          echo "Deleted '${HEAD_REF}'."
